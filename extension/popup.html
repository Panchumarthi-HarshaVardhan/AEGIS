<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360" />
  <title>AEGIS Security Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
          <circle cx="16" cy="16" r="14" stroke="url(#grad)" stroke-width="2.5" />
          <path d="M16 8v8l6 4" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#00d4ff" />
              <stop offset="100%" stop-color="#7c3aed" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <h1 class="header-title">AEGIS Security Companion</h1>
        <p class="header-subtitle">AI Security Companion</p>
      </div>
    </div>
    <div class="connection-status" id="connectionStatus">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">Checking…</span>
    </div>
  </header>

  <!-- Current Page Analysis -->
  <section class="analysis-section" id="analysisSection">
    <div class="page-url-bar" id="pageUrlBar">
      <span class="url-icon">🔗</span>
      <span class="url-text" id="currentUrl">Loading…</span>
    </div>

    <!-- Risk Score -->
    <div class="risk-display">
      <div class="risk-circle" id="riskCircle">
        <svg class="risk-svg" viewBox="0 0 120 120">
          <circle class="risk-track" cx="60" cy="60" r="52" />
          <circle class="risk-progress" id="riskProgress" cx="60" cy="60" r="52" />
        </svg>
        <div class="risk-score-text">
          <span class="risk-number" id="riskNumber">—</span>
          <span class="risk-max">/100</span>
        </div>
      </div>
      <div class="risk-verdict" id="riskVerdict">Analyzing…</div>
      <div class="risk-verdict-sub" id="riskVerdictSub"></div>
    </div>

    <!-- Signals -->
    <div class="signals-container" id="signalsContainer">
      <h3 class="section-title">Threat Signals</h3>
      <div class="signals-list" id="signalsList">
        <div class="signal-empty">No signals yet — navigate to a page to begin analysis.</div>
      </div>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="actions-section">
    <h3 class="section-title">Quick Actions</h3>
    <div class="actions-grid">
      <button class="action-btn" id="btnSummarize">
        <span class="action-icon">📝</span>
        <span class="action-label">Summarize Page</span>
      </button>
      <button class="action-btn" id="btnCheckLinks">
        <span class="action-icon">🔍</span>
        <span class="action-label">Check All Links</span>
      </button>
    </div>
    <!-- Action results -->
    <div class="action-results" id="actionResults" hidden></div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer-text">Powered by <strong>AEGIS Security Companion</strong></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
